name: Actualizar M3U

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Generar lista M3U
        env:
          OUTPUT_FILE: M328x.m3u
        run: |
          python Codigo.py

      - name: Configurar Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Subir cambios si hubo actualización
        run: |
          git add M328x.m3u
          git diff --cached --quiet && echo "Sin cambios para subir" || git commit -m "Actualizar lista M3U"
          git push
